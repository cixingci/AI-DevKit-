<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>路由跳转测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #303133;
            margin-bottom: 20px;
            text-align: center;
        }

        .test-section {
            margin-bottom: 30px;
        }

        .test-section h2 {
            color: #409eff;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .menu-item {
            display: inline-block;
            padding: 12px 24px;
            margin: 8px;
            background: #ecf5ff;
            color: #409eff;
            border: 2px solid #409eff;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }

        .menu-item:hover {
            background: #409eff;
            color: white;
        }

        .menu-item:active {
            transform: scale(0.95);
        }

        .status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            background: #f5f7fa;
            font-size: 14px;
            line-height: 1.6;
        }

        .status.success {
            background: #f0f9ff;
            color: #67c23a;
            border: 1px solid #d9ecff;
        }

        .status.error {
            background: #fef0f0;
            color: #f56c6c;
            border: 1px solid #fde2e2;
        }

        .current-url {
            text-align: center;
            padding: 15px;
            background: #409eff;
            color: white;
            border-radius: 6px;
            margin: 20px 0;
            font-size: 16px;
            font-weight: 500;
        }

        .test-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #409eff;
            color: white;
        }

        .btn-primary:hover {
            background: #66b1ff;
        }

        .btn-success {
            background: #67c23a;
            color: white;
        }

        .btn-success:hover {
            background: #85ce61;
        }

        .btn-warning {
            background: #e6a23c;
            color: white;
        }

        .btn-warning:hover {
            background: #ebb563;
        }

        .info {
            background: #f4f4f5;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 路由跳转测试页面</h1>

        <div class="info">
            <strong>测试说明：</strong><br>
            1. 点击下方导航菜单项测试路由跳转<br>
            2. 观察浏览器地址栏URL变化<br>
            3. 确认页面内容正确切换<br>
            4. 检查当前菜单项是否高亮显示
        </div>

        <div class="current-url" id="currentUrl">
            当前URL: / (加载中...)
        </div>

        <div class="test-section">
            <h2>📝 主要导航菜单</h2>
            <div class="test-buttons">
                <a href="/" class="menu-item" id="nav-dashboard">工作台</a>
                <a href="/projects" class="menu-item" id="nav-projects">项目管理</a>
                <a href="/cards" class="menu-item" id="nav-cards">卡片视图</a>
                <a href="/workflows" class="menu-item" id="nav-workflows">工作流</a>
                <a href="/settings" class="menu-item" id="nav-settings">设置</a>
            </div>
            <div class="status" id="dashboard-status"></div>
        </div>

        <div class="test-section">
            <h2>🔄 页面内导航</h2>
            <div class="test-buttons">
                <button class="btn-primary" onclick="testRouterPush()">测试 router.push</button>
                <button class="btn-success" onclick="testBrowserBack()">测试浏览器后退</button>
                <button class="btn-warning" onclick="testBrowserForward()">测试浏览器前进</button>
            </div>
            <div class="status" id="navigation-status"></div>
        </div>

        <div class="test-section">
            <h2>🔍 路由信息</h2>
            <div class="status">
                <p><strong>当前路由：</strong> <span id="route-path">-</span></p>
                <p><strong>当前名称：</strong> <span id="route-name">-</span></p>
                <p><strong>当前路径参数：</strong> <span id="route-params">-</span></p>
            </div>
        </div>
    </div>

    <script>
        // 更新URL显示
        function updateUrlDisplay() {
            const url = window.location.pathname;
            document.getElementById('currentUrl').textContent = `当前URL: ${url}`;

            // 更新路由信息
            document.getElementById('route-path').textContent = url || '/';
            document.getElementById('route-name').textContent = window.location.hash ? 'Hash路由' : '标准路由';
            document.getElementById('route-params').textContent = '-';

            // 高亮当前菜单项
            highlightActiveMenuItem();
        }

        // 高亮当前菜单项
        function highlightActiveMenuItem() {
            const pathname = window.location.pathname;
            const menuItems = [
                { id: 'nav-dashboard', path: '/' },
                { id: 'nav-projects', path: '/projects' },
                { id: 'nav-cards', path: '/cards' },
                { id: 'nav-workflows', path: '/workflows' },
                { id: 'nav-settings', path: '/settings' }
            ];

            menuItems.forEach(item => {
                const el = document.getElementById(item.id);
                if (pathname === item.path) {
                    el.style.background = '#409eff';
                    el.style.color = 'white';
                } else {
                    el.style.background = '#ecf5ff';
                    el.style.color = '#409eff';
                }
            });
        }

        // 测试router.push
        function testRouterPush() {
            const url = window.location.pathname;
            document.getElementById('navigation-status').innerHTML =
                `<strong>测试说明：</strong><br>
                 当前页面: ${url}<br>
                 请点击浏览器地址栏顶部的导航菜单测试跳转功能`;

            // 如果在首页，测试跳转到其他页面
            if (url === '/') {
                setTimeout(() => {
                    window.location.href = '/projects';
                }, 500);
            }
        }

        // 测试浏览器后退
        function testBrowserBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                document.getElementById('navigation-status').innerHTML =
                    '<span style="color: #f56c6c;">无法后退，这是第一个页面</span>';
            }
        }

        // 测试浏览器前进
        function testBrowserForward() {
            if (window.history.length > 1 && window.history.state) {
                window.history.forward();
            } else {
                document.getElementById('navigation-status').innerHTML =
                    '<span style="color: #f56c6c;">无法前进，没有更多历史记录</span>';
            }
        }

        // 页面加载时初始化
        window.addEventListener('load', () => {
            updateUrlDisplay();
            console.log('路由测试页面已加载');
            console.log('当前URL:', window.location.href);
        });

        // 监听路由变化
        window.addEventListener('popstate', () => {
            updateUrlDisplay();
        });

        // 监听Hash变化（如果使用Hash路由）
        window.addEventListener('hashchange', () => {
            updateUrlDisplay();
        });

        // 监听URL变化
        let lastUrl = window.location.href;
        setInterval(() => {
            if (window.location.href !== lastUrl) {
                lastUrl = window.location.href;
                updateUrlDisplay();
                console.log('URL已更改:', window.location.href);
            }
        }, 100);
    </script>
</body>
</html>
